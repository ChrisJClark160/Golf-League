<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1f4d2e">
    <title>Friends Golf League</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body x-data="app()" x-init="init()">
    <!-- Rules Page -->
    <template x-if="page === 'rules'">
        <div class="min-h-screen bg-gradient-to-br from-green-900 via-green-800 to-green-950">
            <nav class="bg-black bg-opacity-20 border-b border-white border-opacity-10 sticky top-0 z-40">
                <div class="max-w-4xl mx-auto px-6 py-4 flex justify-between items-center">
                    <h1 class="text-2xl font-bold text-white">Golf League</h1>
                    <button @click="page = 'login'" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg font-medium transition">Sign In</button>
                </div>
            </nav>

            <main class="max-w-4xl mx-auto px-6 py-12">
                <div class="space-y-8">
                    <!-- Hero -->
                    <div class="text-center mb-12">
                        <h2 class="text-4xl font-bold text-white mb-4">Match Play Golf League</h2>
                        <p class="text-xl text-green-100">Self-hosted league for mates. 12 weeks. Best player wins.</p>
                    </div>

                    <!-- Quick Facts -->
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="bg-white bg-opacity-10 rounded-lg p-4 text-center border border-white border-opacity-20">
                            <div class="text-3xl font-bold text-green-400">12</div>
                            <div class="text-sm text-gray-300">Week Season</div>
                        </div>
                        <div class="bg-white bg-opacity-10 rounded-lg p-4 text-center border border-white border-opacity-20">
                            <div class="text-3xl font-bold text-green-400">2</div>
                            <div class="text-sm text-gray-300">Matches/Month</div>
                        </div>
                        <div class="bg-white bg-opacity-10 rounded-lg p-4 text-center border border-white border-opacity-20">
                            <div class="text-3xl font-bold text-green-400">3</div>
                            <div class="text-sm text-gray-300">Points/Win</div>
                        </div>
                        <div class="bg-white bg-opacity-10 rounded-lg p-4 text-center border border-white border-opacity-20">
                            <div class="text-3xl font-bold text-green-400">7</div>
                            <div class="text-sm text-gray-300">Awards</div>
                        </div>
                    </div>

                    <!-- How to Play -->
                    <section class="bg-white bg-opacity-10 rounded-lg p-8 border border-white border-opacity-20">
                        <h3 class="text-2xl font-bold text-white mb-4">How to Play</h3>
                        <div class="space-y-4 text-gray-100">
                            <p><strong>Format:</strong> Singles handicap match play (18 holes)</p>
                            <p><strong>Scoring:</strong> Win = 3 points, Draw = 1 point, Loss = 0 points</p>
                            <p><strong>9-hole matches:</strong> Win = 2 points, Draw = 1 point, Loss = 0 points</p>
                            <p><strong>Qualifying:</strong> Min 3 matches with at least 3 different opponents</p>
                            <p><strong>Match limit:</strong> Max 2 counting matches vs same opponent (extras are friendly only)</p>
                        </div>
                    </section>

                    <!-- Scoring & Bonuses -->
                    <section class="bg-white bg-opacity-10 rounded-lg p-8 border border-white border-opacity-20">
                        <h3 class="text-2xl font-bold text-white mb-4">Bonuses</h3>
                        <div class="space-y-3 text-gray-100">
                            <p><strong>+1 New Opponent:</strong> Beat a new opponent you haven't played (season)</p>
                            <p><strong>+1 Close Rematch:</strong> Play again someone you beat 2&1 or closer (from week 6)</p>
                        </div>
                    </section>

                    <!-- Handicaps -->
                    <section class="bg-white bg-opacity-10 rounded-lg p-8 border border-white border-opacity-20">
                        <h3 class="text-2xl font-bold text-white mb-4">Handicap Adjustments</h3>
                        <div class="space-y-3 text-gray-100">
                            <p><strong>Automatic cut:</strong> -1 for heavy wins (5&4 or better)</p>
                            <p><strong>Weekly review:</strong> 3 straight wins = -1 | 3 straight losses = +1</p>
                            <p><strong>Limit:</strong> Max 1 cut per fortnight per player</p>
                            <p><strong>Range:</strong> 4 to 42</p>
                        </div>
                    </section>

                    <!-- Awards -->
                    <section class="bg-white bg-opacity-10 rounded-lg p-8 border border-white border-opacity-20">
                        <h3 class="text-2xl font-bold text-white mb-4">Awards</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-gray-100">
                            <div>
                                <p class="font-semibold text-green-400">League Champion</p>
                                <p class="text-sm">Most points overall</p>
                            </div>
                            <div>
                                <p class="font-semibold text-green-400">Tour Champion</p>
                                <p class="text-sm">Best points-per-match (min 4 matches)</p>
                            </div>
                            <div>
                                <p class="font-semibold text-green-400">Most Improved</p>
                                <p class="text-sm">Best handicap reduction (excl. top 2)</p>
                            </div>
                            <div>
                                <p class="font-semibold text-green-400">Most Social</p>
                                <p class="text-sm">Most matches played</p>
                            </div>
                            <div>
                                <p class="font-semibold text-green-400">Most Active</p>
                                <p class="text-sm">Consistent participation</p>
                            </div>
                            <div>
                                <p class="font-semibold text-green-400">Underdog</p>
                                <p class="text-sm">Biggest upset (lowest vs highest handicap)</p>
                            </div>
                            <div class="md:col-span-2">
                                <p class="font-semibold text-amber-400">Wooden Spoon</p>
                                <p class="text-sm">Fewest points (participation prize, not shame)</p>
                            </div>
                        </div>
                    </section>

                    <!-- Group Play -->
                    <section class="bg-white bg-opacity-10 rounded-lg p-8 border border-white border-opacity-20">
                        <h3 class="text-2xl font-bold text-white mb-4">Group Rounds (3-Ball / 4-Ball)</h3>
                        <p class="text-gray-100 mb-4">Play multiple matches in one round. Declare pairings before tee-off.</p>
                        <p class="text-gray-100"><strong>3-ball:</strong> Up to 3 matches | <strong>4-ball:</strong> Typically 2 matches</p>
                    </section>

                    <!-- Ready to Play -->
                    <div class="text-center py-8">
                        <button @click="page = 'login'" class="px-8 py-3 bg-green-600 hover:bg-green-700 text-white font-bold text-lg rounded-lg transition">
                            Ready? Sign In
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </template>

    <!-- Login Page -->
    <template x-if="page === 'login'">
        <div class="min-h-screen bg-gradient-to-br from-green-900 via-green-800 to-green-950 flex items-center justify-center p-6">
            <div class="w-full max-w-md">
                <div class="bg-black bg-opacity-25 backdrop-blur-xl border border-white border-opacity-10 rounded-2xl p-8">
                    <div class="text-center mb-8">
                        <h1 class="text-3xl font-bold text-white mb-2">Golf League</h1>
                        <p class="text-green-100">Sign in to your account</p>
                    </div>

                    <form @submit.prevent="login" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-200 mb-2">Email</label>
                            <input
                                type="email"
                                x-model="credentials.email"
                                placeholder="you@example.com"
                                class="w-full px-4 py-2 bg-white bg-opacity-10 border border-white border-opacity-20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-green-400 focus:border-opacity-100"
                                required>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-200 mb-2">Password</label>
                            <input
                                type="password"
                                x-model="credentials.password"
                                placeholder="••••••••"
                                class="w-full px-4 py-2 bg-white bg-opacity-10 border border-white border-opacity-20 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:border-green-400 focus:border-opacity-100"
                                required>
                        </div>

                        <template x-if="error">
                            <div class="p-3 bg-red-500 bg-opacity-20 border border-red-500 border-opacity-30 rounded-lg text-red-200 text-sm">
                                <span x-text="error"></span>
                            </div>
                        </template>

                        <button
                            type="submit"
                            :disabled="loading"
                            class="w-full py-2 px-4 bg-green-600 hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold rounded-lg transition">
                            <span x-show="!loading">Sign In</span>
                            <span x-show="loading">Signing In…</span>
                        </button>
                    </form>

                    <p class="text-center text-gray-400 text-sm mt-6">
                        Demo: admin@example.com / password
                    </p>
                </div>
            </div>
        </div>
    </template>

    <!-- League Page -->
    <template x-if="page === 'league'">
        <div class="min-h-screen bg-gray-50">
            <!-- Header -->
            <header class="bg-white border-b border-gray-200">
                <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
                    <h1 class="text-2xl font-bold text-gray-900">Golf League</h1>
                    <button
                        @click="logout()"
                        class="px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-900 rounded-lg font-medium transition">
                        Sign Out
                    </button>
                </div>
            </header>

            <main class="max-w-7xl mx-auto px-6 py-8">
                <!-- Tabs -->
                <div class="flex gap-4 mb-6 border-b border-gray-200">
                    <button
                        @click="tab = 'standings'"
                        :class="tab === 'standings' ? 'border-b-2 border-green-600 text-green-600' : 'text-gray-600'"
                        class="py-2 px-4 font-semibold transition">
                        Standings
                    </button>
                    <button
                        @click="tab = 'players'"
                        :class="tab === 'players' ? 'border-b-2 border-green-600 text-green-600' : 'text-gray-600'"
                        class="py-2 px-4 font-semibold transition">
                        Players
                    </button>
                </div>

                <!-- Standings Tab -->
                <template x-if="tab === 'standings'">
                    <div class="bg-white rounded-lg shadow overflow-hidden">
                        <table class="w-full">
                            <thead class="bg-gray-100 border-b border-gray-200">
                                <tr>
                                    <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Rank</th>
                                    <th class="px-6 py-3 text-left text-sm font-semibold text-gray-900">Player</th>
                                    <th class="px-6 py-3 text-center text-sm font-semibold text-gray-900">Matches</th>
                                    <th class="px-6 py-3 text-center text-sm font-semibold text-gray-900">Points</th>
                                    <th class="px-6 py-3 text-center text-sm font-semibold text-gray-900">Handicap</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200">
                                <template x-if="standings.length === 0">
                                    <tr>
                                        <td colspan="5" class="px-6 py-8 text-center text-gray-500">
                                            No standings data yet. Start playing matches!
                                        </td>
                                    </tr>
                                </template>
                                <template x-for="(player, idx) in standings" :key="player.id">
                                    <tr class="hover:bg-gray-50">
                                        <td class="px-6 py-4 text-sm font-semibold text-gray-900" x-text="idx + 1"></td>
                                        <td class="px-6 py-4 text-sm text-gray-900" x-text="player.name"></td>
                                        <td class="px-6 py-4 text-sm text-center text-gray-600" x-text="player.matchCount || 0"></td>
                                        <td class="px-6 py-4 text-sm text-center text-gray-900 font-semibold" x-text="player.points || 0"></td>
                                        <td class="px-6 py-4 text-sm text-center text-gray-600" x-text="player.handicap || '—'"></td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>

                <!-- Players Tab -->
                <template x-if="tab === 'players'">
                    <div class="grid gap-4 grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
                        <template x-if="players.length === 0">
                            <div class="col-span-full bg-white rounded-lg shadow p-8 text-center text-gray-500">
                                No players in this season yet.
                            </div>
                        </template>
                        <template x-for="player in players" :key="player.id">
                            <div class="bg-white rounded-lg shadow p-6">
                                <h3 class="text-lg font-semibold text-gray-900" x-text="player.name"></h3>
                                <p class="text-sm text-gray-600" x-text="player.email"></p>
                                <div class="mt-4 pt-4 border-t border-gray-200">
                                    <p class="text-sm text-gray-600">Handicap: <span class="font-semibold" x-text="player.handicap || '—'"></span></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </template>
            </main>
        </div>
    </template>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="/app.js"></script>
</body>
</html>
