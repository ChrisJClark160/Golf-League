server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA-style fallback: any unknown route serves index.html
    # (Caddy already strips /api/* and /_/* before they reach us)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressive caching for static assets
    location ~* \.(?:css|js|svg|woff2|png|jpg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # No caching for HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Hide nginx version
    server_tokens off;
}
